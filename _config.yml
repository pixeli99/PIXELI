title: PIXELI
tagline: 论文 · 随笔 · 笔记
author: pixeli99
email: 2040gis@gmail.com
description: 一个人的知识库

baseurl: "/PIXELI"
url: "https://pixeli99.github.io"

lang: zh-CN
timezone: Asia/Shanghai

permalink: /:collection/:path/

collections:
  notes:
    output: true
    permalink: /notes/:path/
  papers:
    output: true
    permalink: /papers/:path/

defaults:
  - scope:
      path: ""
      type: notes
    values:
      layout: post
  - scope:
      path: ""
      type: papers
    values:
      layout: post

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
  hard_wrap: false
  footnote_nr: 1

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: feed.xml
  collections:
    notes:
      path: notes.xml
    papers:
      path: papers.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .claude/
  - README.md
  - .github/

---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.date %}
      <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%Y 年 %-m 月 %-d 日" }}
      </time>
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}">← 回首页</a>
  </nav>
</article>
